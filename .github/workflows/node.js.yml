# This workflow will do a clean install of node dependencies, cache/restore
# them and run tests across different versions of node. For more information
# see: https://docs.github.com/en/actions/tutorials/build-and-test-code/nodejs

name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: install
        run: npm ci
      - name: lint
        run: npm run ci:lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v6.0.2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6.3.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: install
      run: npm ci
    - name: test
      run: npm run ci:test
    - name: Report Node.js ${{ matrix.node-version }} coverage info to Coveralls
      uses: coverallsapp/github-action@master
      with:
        parallel: true
        flag-name: nodejs-${{ matrix.node-version }}
        github-token: ${{ secrets.github_token }}

  add-coverage-comment-to-PR:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.github_token }}
        parallel-finished: true
